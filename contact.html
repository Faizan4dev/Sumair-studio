<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Sumair Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="js/script.js"></script>

</head>
<body>

    <!-- Transparent Header -->
    <header>
        <div class="logo">Sumair Studio</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="contact.html" class="btn">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Premium Contact Section -->
    <section class="premium-contact">

        <div class="contact-overlay"></div>

        <div class="contact-box">
            <h1>Start Your Project</h1>
            <p>Luxury interior solutions tailored for you in Faisalabad.</p>

            <form class="contact-form">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="tel" placeholder="Phone Number" required>
                <textarea placeholder="Tell us about your project..." rows="4"></textarea>
                <button type="submit">Send Inquiry</button>
            </form>

            <div class="contact-details">
                <p>📍 Faisalabad, Pakistan</p>
                <p>📞 +92-300-0000000</p>
                <p>✉ info@sumairstudio.com</p>
            </div>
        </div>

    </section>

    <footer>
        <p>© 2026 Sumair Studio | Faisalabad</p>
    </footer>

</body>
</html>
